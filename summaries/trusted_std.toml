# Trusted RAMORT model for selected Rust standard-library containers.
# These are resource contracts, not full implementations.

[[summaries]]
trust = "TrustedStd"
type_contains = "Vec"
method = "push"
receiver_arg = 0
cost = "1"
amortized_cost = "1"
effects = ["len(receiver) += 1"]
requires = "MutBorrow"
notes = ["Trusted amortized model for Vec::push; resize/allocator hidden behind amortized contract."]

[[summaries]]
trust = "TrustedStd"
type_contains = "Vec"
method = "pop"
receiver_arg = 0
cost = "1"
amortized_cost = "1"
effects = ["len(receiver) -= 1"]
requires = "MutBorrow"
condition = "old(len(receiver)) > 0"
returns = "Some iff old(len(receiver)) > 0"

[[summaries]]
trust = "TrustedStd"
type_contains = "Vec"
method = "is_empty"
receiver_arg = 0
cost = "1"
amortized_cost = "1"
effects = []
requires = "SharedBorrow"
condition = "len(receiver) == 0"

[[summaries]]
trust = "TrustedStd"
type_contains = "Vec"
method = "clear"
receiver_arg = 0
cost = "len(receiver)"
effects = ["len(receiver) := 0"]
requires = "MutBorrow"
partial_unknown = "drop_cost_T * old(len(receiver))"

[[summaries]]
trust = "TrustedStd"
type_contains = "VecDeque"
method = "push_back"
receiver_arg = 0
cost = "1"
amortized_cost = "1"
effects = ["len(receiver) += 1"]
requires = "MutBorrow"

[[summaries]]
trust = "TrustedStd"
type_contains = "VecDeque"
method = "pop_front"
receiver_arg = 0
cost = "1"
amortized_cost = "1"
effects = ["len(receiver) -= 1"]
